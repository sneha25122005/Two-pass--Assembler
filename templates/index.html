<!DOCTYPE html>
<html>
<head>

<title>Two Pass Assembler</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:40px;
}

h1{text-align:center;}

textarea{
width:100%;
height:180px;
padding:10px;
font-size:15px;
}

button{
background:#4CAF50;
color:white;
padding:10px 20px;
border:none;
margin-top:10px;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

</style>

</head>

<body>

<h1>Two Pass Assembler</h1>

<textarea id="code"></textarea>

<br>

<button onclick="assemble()">Assemble</button>

<div class="container">

<div class="card">
<h3>Pass-1 Instruction Table</h3>
<div id="pass1"></div>
</div>

<div class="card">
<h3>Symbol Table</h3>
<div id="symtab"></div>
</div>

<div class="card">
<h3>Literal Table</h3>
<div id="littab"></div>
</div>

<!-- NEW POOL TABLE CARD -->

<div class="card">
<h3>Pool Table</h3>

<table>
<tr>
<th>Pool Index</th>
</tr>

<tbody id="poolTable"></tbody>

</table>

</div>

<div class="card">
<h3>Pass-2 Machine Code</h3>
<div id="machine"></div>
</div>

</div>

<script>

function assemble(){

let code=document.getElementById("code").value;

fetch("/assemble",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code:code})
})

.then(res=>res.json())
.then(data=>{

/* PASS 1 TABLE */

let p1="<table><tr><th>LC</th><th>Instruction</th></tr>";

data.pass1_table.forEach(row=>{
p1+=`<tr><td>${row.LC}</td><td>${row.INSTRUCTION}</td></tr>`;
});

p1+="</table>";

document.getElementById("pass1").innerHTML=p1;


/* SYMBOL TABLE */

let sym="<table><tr><th>Symbol</th><th>Address</th></tr>";

for(let k in data.symtab){
sym+=`<tr><td>${k}</td><td>${data.symtab[k]}</td></tr>`;
}

sym+="</table>";

document.getElementById("symtab").innerHTML=sym;


/* LITERAL TABLE */

let lit="<table><tr><th>Literal</th><th>Address</th></tr>";

for(let k in data.littab){
lit+=`<tr><td>${k}</td><td>${data.littab[k]}</td></tr>`;
}

lit+="</table>";

document.getElementById("littab").innerHTML=lit;


/* POOL TABLE */

let poolBody = document.getElementById("poolTable");
poolBody.innerHTML="";

data.pooltab.forEach(p=>{
let row=`<tr>
<td>${p}</td>
</tr>`;
poolBody.innerHTML+=row;
});


/* PASS 2 MACHINE CODE */

let mc="<table><tr><th>LC</th><th>Opcode</th><th>Register</th><th>Address</th></tr>";

data.pass2_table.forEach(row=>{
mc+=`<tr>
<td>${row.LC}</td>
<td>${row.OPCODE}</td>
<td>${row.REGISTER}</td>
<td>${row.ADDRESS}</td>
</tr>`;
});

mc+="</table>";

document.getElementById("machine").innerHTML=mc;

});

}

</script>

</body>
</html>
