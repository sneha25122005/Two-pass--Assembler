<!DOCTYPE html>
<html>
<head>

<title>Two Pass Assembler</title>

<style>

body{
font-family: Arial;
background:#f5f7fb;
margin:40px;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:200px;
padding:10px;
font-size:15px;
}

button{
background:#4CAF50;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#45a049;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border-bottom:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

</style>

</head>

<body>

<h1>Two Pass Assembler</h1>

<textarea id="code">
START 100
MOVER AREG ='5'
ADD BREG ONE
MOVEM AREG RESULT
ONE DC 1
RESULT DS 1
END
</textarea>

<br>

<button onclick="assemble()">Assemble</button>

<div class="container">

<div class="card">
<h3>Symbol Table</h3>
<div id="symtab"></div>
</div>

<div class="card">
<h3>Literal Table</h3>
<div id="littab"></div>
</div>

<div class="card">
<h3>Machine Code</h3>
<div id="machine"></div>
</div>

</div>

<script>

function assemble(){

let code=document.getElementById("code").value;

fetch("/assemble",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({code:code})
})
.then(res=>res.json())
.then(data=>{

console.log(data); // debugging

/* SYMBOL TABLE */

let sym="<table><tr><th>Symbol</th><th>Address</th></tr>";

for(let k in data.symbol_table){
sym+=`<tr><td>${k}</td><td>${data.symbol_table[k]}</td></tr>`;
}

sym+="</table>";

document.getElementById("symtab").innerHTML=sym;


/* LITERAL TABLE */

let lit="<table><tr><th>Literal</th><th>Address</th></tr>";

for(let k in data.literal_table){
lit+=`<tr><td>${k}</td><td>${data.literal_table[k]}</td></tr>`;
}

lit+="</table>";

document.getElementById("littab").innerHTML=lit;


/* MACHINE CODE TABLE */

let mc="<table><tr><th>LC</th><th>Opcode</th><th>Machine Code</th><th>Register</th><th>Address</th></tr>";

if(data.machine_code){

data.machine_code.forEach(row=>{

mc+=`<tr>
<td>${row.LC}</td>
<td>${row.OPCODE}</td>
<td>${row.MACHINE_CODE}</td>
<td>${row.REGISTER}</td>
<td>${row.ADDRESS}</td>
</tr>`;

});

}

mc+="</table>";

document.getElementById("machine").innerHTML=mc;

})
.catch(err=>{
console.error("Error:",err);
});

}

</script>

</body>
</html>
